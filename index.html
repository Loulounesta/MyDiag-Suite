<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyDiag Terrain</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MyDiag-Terrain">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <style>
        :root {
            --bg: #F4F7F9; --sur: #FFFFFF; --bor: #E2E8F0; --tx: #0F172A; --tx2: #475569;
            --acc: #2563EB; --acc-l: #EFF6FF; --ok: #16A34A; --ok-l: #F0FDF4;
            --dan: #EF4444; --dan-l: #FEF2F2; --warn: #F59E0B; --warn-l: #FFFBEB;
            --r: 16px; --rs: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--tx); padding-bottom: 100px; -webkit-font-smoothing: antialiased; }

        /* HEADER */
        .hd { background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 20; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .hd-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px;}
        .btn-save { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; backdrop-filter: blur(5px); }
        .btn-save:active { background: rgba(255,255,255,0.2); transform: scale(0.95); }

        @keyframes blinkGreen { 0% { background-color: #16A34A; box-shadow: 0 0 12px #16A34A; } 100% { background-color: #475569; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); } }
        .saved-blink { animation: blinkGreen 1s ease-out; }

        /* TABS */
        .tabs { background: #0F172A; display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; position: sticky; top: 52px; z-index: 19; padding: 10px 16px; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { flex: 0 0 auto; padding: 8px 16px; font-size: 13px; font-weight: 600; color: #94A3B8; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: 0.2s; background: rgba(255,255,255,0.05); }
        .tab.on { color: #fff; background: var(--acc); box-shadow: 0 4px 10px rgba(37,99,235,0.3); }
        
        .vw { display: none; padding: 20px 16px; max-width: 800px; margin: 0 auto; }
        .vw.on { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .sl { font-size: 12px; font-weight: 800; letter-spacing: 1px; color: #64748b; text-transform: uppercase; margin: 24px 0 10px; padding-left: 4px; }
        .card { background: var(--sur); border-radius: var(--r); border: 1px solid #F8FAFC; overflow: hidden; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(15,23,42,0.04); }
        
        .fr { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--bor); min-height: 54px; }
        .fr:last-child { border-bottom: none; }
        .fl { font-size: 14px; color: var(--tx); min-width: 90px; flex-shrink: 0; font-weight: 600; line-height:1.3;}
        
        .fr select, .fr input { flex: 1; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: var(--acc); text-align: right; outline: none; font-weight: 700; transition: 0.2s; -webkit-appearance: none; margin-left: 10px; min-width:0; }
        .fr select:focus, .fr input:focus { background: #FFF; border-color: var(--acc); box-shadow: 0 0 0 3px var(--acc-l); }

        .btn-p { background: var(--acc); color: #fff; box-shadow: 0 6px 16px rgba(37,99,235,0.25); padding: 16px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn-s { padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-xs { padding: 10px 14px; font-size: 12px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; transition: 0.2s;}
        .qbtn { padding: 8px 10px; font-size: 12px; border-radius: 8px; font-weight: 700; border: 1px solid var(--bor); background: #fff; cursor: pointer; transition: 0.2s; color: var(--tx2); text-align: center; }
        
        .item-row { background: var(--sur); border-radius: 12px; border: 1px solid var(--bor); padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,0.02);}
        .badge { background: #F1F5F9; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; margin-right: 8px; color: #475569;}
        .badge-elem { background: #F1F5F9; color: #475569; padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: 800; display: inline-block; margin-top: 6px; border: 1px solid var(--bor);}
        .badge-ok { background: var(--ok-l); color: var(--ok); border-color: #BBF7D0; }
        .badge-warn { background: var(--warn-l); color: var(--warn); border-color: #FDE68A; }        
        
        .canvas-container { background:var(--sur); border: 1px solid var(--bor); border-radius: var(--r); padding:16px; margin-bottom:20px; box-shadow: 0 8px 24px rgba(15,23,42,0.04); }
        #croquis-canvas { width: 100%; height: 260px; background: #F8FAFC; border-radius: 12px; border: 2px dashed #E2E8F0; margin-top: 12px;}
        
        .thumb { height: 44px; width: 44px; object-fit: cover; border-radius: 8px; border: 1px solid var(--bor); cursor: pointer; background: #fff;}
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #0F172A; color: #fff; padding: 14px 28px; border-radius: 30px; font-size: 14px; font-weight: 700; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 9999; box-shadow: 0 10px 30px rgba(15,23,42,0.3); text-align:center; white-space: nowrap;}
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
        
        .dim-block { padding: 16px; border-bottom: 1px solid var(--bor); }
        .dim-inputs { display:flex; gap:8px; align-items: center; }
        .dim-inputs input { flex:1; min-width: 0; background:#F8FAFC; border:1px solid var(--bor); border-radius:10px; padding:12px 6px; font-size:16px; text-align:center; font-weight:800; color:var(--acc); }

        .niv-btn { flex:1; padding:12px; border:none; border-radius:10px; font-weight:800; font-size:13px; transition:0.2s; cursor:pointer;}
        .niv-on { background:var(--tx); color:#fff; }
        .niv-off { background:var(--sur); color:var(--tx2); border:1px solid var(--bor);}

        .coll-acc-hd { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--sur); border-radius: var(--r); border: 1px solid var(--bor); margin-top: 12px; cursor: pointer; font-weight: 800; font-size: 14px; box-shadow: 0 4px 12px rgba(15,23,42,0.02); transition:0.2s;}
        .coll-acc-body { display: none; margin-top: 8px; }
        .coll-acc-body.open { display: block; animation: fadeIn 0.2s ease-in-out; }
        
        .appt-target-sel { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #CBD5E1; font-weight: 800; color: var(--tx); background: var(--sur); margin-bottom: 16px; font-size: 14px; outline:none;}
        .calc-input { width:100%; padding:10px; border:1px solid var(--bor); border-radius:8px; background:#F8FAFC; color:var(--acc); font-weight:bold; font-size:14px; text-align:center;}
        .calc-input::placeholder { color: #94A3B8; font-weight:normal; }

        /* SAFE UX PATCHES */
        .safe-home-hero, .safe-exp-hero { background:linear-gradient(135deg, #0F172A 0%, #1E293B 100%); color:white; padding:24px; border-radius:24px; box-shadow:0 12px 32px rgba(15,23,42,0.18); margin-bottom:16px; position:relative; overflow:hidden;}
        .safe-home-title, .safe-exp-title { font-size:24px; font-weight:900; letter-spacing:-0.6px; margin-bottom:6px; position:relative; z-index:1; }
        .safe-home-sub, .safe-exp-sub { font-size:14px; color:#CBD5E1; font-weight:600; position:relative; z-index:1; }
        .safe-home-kpis { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:22px; }
        .safe-home-kpi { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.08); padding:16px; border-radius:16px; text-align:center; backdrop-filter:blur(10px); }
        .safe-home-kpi-num { font-size:30px; font-weight:900; color:#FFF; }
        .safe-home-kpi-num.accent { color:#38BDF8; }
        .safe-home-kpi-lbl { margin-top:6px; font-size:11px; color:#94A3B8; font-weight:800; text-transform:uppercase; letter-spacing:0.6px; }
        .safe-home-next { background:#fff; border:1px solid var(--bor); border-radius:18px; padding:18px; margin-bottom:16px; box-shadow:0 8px 24px rgba(15,23,42,0.04); }
        .safe-home-next-title { font-size:12px; font-weight:900; letter-spacing:1px; text-transform:uppercase; color:#64748b; margin-bottom:8px; }
        .safe-home-next-text { font-size:14px; color:var(--tx); font-weight:700; line-height:1.5; }
        .safe-home-next-sub { margin-top:6px; font-size:13px; color:var(--tx2); line-height:1.5; }
        
        .safe-section-title { font-size:12px; font-weight:900; letter-spacing:1px; color:#64748b; text-transform:uppercase; margin:0 0 10px 4px; }
        .safe-context-card { background:linear-gradient(135deg, #F8FAFC 0%, #EFF6FF 100%); border:1px solid #BFDBFE; border-radius:var(--r); padding:16px; margin-bottom:16px; }
        .safe-context-head { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; }
        .safe-context-title { font-size:16px; font-weight:900; color:var(--tx); letter-spacing:-0.3px; }
        .safe-context-sub { font-size:12px; color:var(--tx2); font-weight:600; }
        .safe-mini-badge { display:inline-flex; align-items:center; gap:6px; background:#DBEAFE; color:#1D4ED8; border:1px solid #BFDBFE; border-radius:999px; padding:6px 10px; font-size:11px; font-weight:800; white-space:nowrap; }
        
        .safe-subcard { background:#fff; border:1px solid var(--bor); border-radius:14px; overflow:hidden; margin-bottom:14px; }
        .safe-subhead { padding:12px 16px; background:#F8FAFC; border-bottom:1px solid var(--bor); font-size:12px; font-weight:900; color:var(--tx2); text-transform:uppercase; }
        .safe-subhint { display:block; margin-top:4px; font-size:
